<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 Page</title>

  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700&display=swap" rel="stylesheet"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Poppins",sans-serif;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#f4813f,#f1556a);
      overflow:hidden;
    }

    .error-container{
      text-align:center;
      background:#fff;
      padding:60px 40px;
      border-radius:20px;
      width:90%;
      max-width:600px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      animation:fadeIn 1s ease;
    }

    .error-container h1{
      font-size:120px;
      color:#f1556a;
      line-height:1;
      font-weight:700;
    }

    .error-container h2{
      font-size:35px;
      color:#191a20;
      margin-top:10px;
    }

    .error-container p{
      margin-top:20px;
      color:#777;
      font-size:18px;
      line-height:30px;
    }

    .home-btn{
      display:inline-block;
      margin-top:35px;
      text-decoration:none;
      background:#f4813f;
      color:#fff;
      padding:14px 35px;
      border-radius:50px;
      font-size:18px;
      transition:0.3s ease;
    }

    .home-btn:hover{
      background:#f1556a;
      transform:scale(1.05);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* Mobile Responsive */

    @media screen and (max-width:768px){

      .error-container{
        padding:40px 25px;
      }

      .error-container h1{
        font-size:90px;
      }

      .error-container h2{
        font-size:28px;
      }

      .error-container p{
        font-size:16px;
        line-height:28px;
      }

      .home-btn{
        font-size:16px;
        padding:12px 28px;
      }
    }

    @media screen and (max-width:426px){

      .error-container h1{
        font-size:70px;
      }

      .error-container h2{
        font-size:22px;
      }

      .error-container p{
        font-size:14px;
        line-height:24px;
      }
    }

  </style>

</head>
<body>

  <div class="error-container">

    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
      The page you are trying to access does not exist
      or is currently unavailable.
    </p>

    <a href="index.html" class="home-btn">
      Back To Home
    </a>

  </div>

</body>
</html>
